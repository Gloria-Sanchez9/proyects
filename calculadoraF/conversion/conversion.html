<body>
    <h1>CONVERSIÓN DE COORDENADAS</h1>
    
    <div class="container">
        <div class="output-section">
            <h4>Resultado</h4>
            <div id="result"></div>
        </div>
        <div class="input-section">
            <center><h4>Modos</h4></center>
            
            <div class="dimension-buttons">
                <button id="btn-2d" class="active" onclick="setDimension('2D')">RÂ² (2D)</button>
                <button id="btn-3d" onclick="setDimension('3D')">RÂ³ (3D)</button>
            </div>
            <h4>Sistema</h4>
            <div class="coord-type-buttons">
                <button id="btn-rect" class="active" onclick="setCoordType('rect')">Rectangulares</button>
                <button id="btn-polar" onclick="setCoordType('polar')">Polares</button>
                <button id="btn-cylindrical" class="hidden" onclick="setCoordType('cylindrical')">Cili­ndricas</button>
                <button id="btn-spherical" class="hidden" onclick="setCoordType('spherical')">Esféricas</button>
            </div>
            
            <h4>Ingrese las coordenadas:</h4>
            <div class="input-fields">
                <div class="input-group" id="input1">
                    <label id="label1">X:</label>
                    <input type="number" id="val1" step="any">
                </div>
                <div class="input-group" id="input2">
                    <label id="label2">Y:</label>
                    <input type="number" id="val2" step="any">
                </div>
                <div class="input-group hidden" id="input3">
                    <label id="label3">Z:</label>
                    <input type="number" id="val3" step="any">
                </div>
                <div class="buttons-container">
           <div class="conversion-title" id="conversion-title">Convertir a:</div>
            <div class="conversion-buttons" id="conversion-options"></div>
        </div>
            </div>
        </div>

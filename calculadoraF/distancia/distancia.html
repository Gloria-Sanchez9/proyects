<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distancia entre Dos Puntos</title>
    
    <link rel="icon" href="imagenes/logo1.png" type="image/png">
    <link rel="shortcut icon" href="imagenes/logo1.png" type="image/png">
    
    <link rel="stylesheet" href="styleDistancia.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo-box">
                <img class = "logo" src="../imagenes/logo2.png" width="70px"> </div>
            </div>
            <a href="../../inicioF/inicio.html">Proyectos</a>
            <a href="../inicio/inicio.html">Inicio</a>
            <a href="../conversion/conversion.html">Conversión Coordenadas</a>
            <a href="../distancia/distancia.html">Distancia</a>
            <a href="../videos/videos.html">Videos</a>
        </nav>
    </header>

    <h1>DISTANCIA ENTRE DOS PUNTOS</h1>
    
    <div class="container">
        <div class="output-section">
            <h4>Resultado</h4>
            <div id="result"></div>
        </div>

        <div class="input-section">
            <center><h4>Modos</h4></center>
            
            <div class="dimension-buttons">
                <button id="btn-2d" class="active" onclick="setDimension('2D')">R² (2D)</button>
                <button id="btn-3d" onclick="setDimension('3D')">R³ (3D)</button>
            </div>
            
            <center><h4>Sistema</h4></center>
            <div class="coord-type-buttons">
                <button id="btn-rect" class="active" onclick="setCoordType('rect')">Rectangulares</button>
                <button id="btn-polar" onclick="setCoordType('polar')">Polares</button>
                <button id="btn-cylindrical" class="hidden" onclick="setCoordType('cylindrical')">Cilíndricas</button>
                <button id="btn-spherical" class="hidden" onclick="setCoordType('spherical')">Esféricas</button>
            </div>
            
            <h4>Fórmula</h4>
            <div id="formula-display" class="formula">
                √[(x₂ - x₁)² + (y₂ - y₁)²]
            </div>
            
            <h4>Ingrese las coordenadas:</h4>
            
            <div class="input-fields">
                <div class="point-group">
                    <div class="point-title">Punto A:</div>
                    <div class="input-group" id="a1-group">
                        <label id="a1-label">X:</label>
                        <input type="number" id="a1" step="any">
                    </div>
                    <div class="input-group" id="a2-group">
                        <label id="a2-label">Y:</label>
                        <input type="number" id="a2" step="any">
                    </div>
                    <div class="input-group hidden" id="a3-group">
                        <label id="a3-label">Z:</label>
                        <input type="number" id="a3" step="any">
                    </div>
                </div>
                
                <div class="point-group">
                    <div class="point-title">Punto B:</div>
                    <div class="input-group" id="b1-group">
                        <label id="b1-label">X:</label>
                        <input type="number" id="b1" step="any">
                    </div>
                    <div class="input-group" id="b2-group">
                        <label id="b2-label">Y:</label>
                        <input type="number" id="b2" step="any">
                    </div>
                    <div class="input-group hidden" id="b3-group">
                        <label id="b3-label">Z:</label>
                        <input type="number" id="b3" step="any">
                    </div>
                </div>
            </div>
        </div>
        
        <div class="buttons-container">
            <button id="btn-calculate" onclick="calculateDistance()">Calcular Distancia</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
